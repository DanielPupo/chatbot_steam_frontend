<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM+ Hub - Fale com o Sparky</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Customizações finas para renderização do Markdown gerado pelo marked.js */
        .markdown-content p { margin-bottom: 0.5rem; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul { list-style-type: square; margin-left: 1.25rem; margin-bottom: 0.5rem; }
        .markdown-content strong { font-weight: 700; color: #0f172a; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 md:p-6">

    <div class="w-full max-w-5xl flex flex-col md:flex-row gap-6 h-[85vh] max-h-[780px]">
        
        <div class="w-full md:w-1/3 bg-white border-4 border-slate-900 rounded-3xl p-6 flex flex-col justify-between shadow-[6px_6px_0px_0px_rgba(15,23,42,1)]">
            <div>
                <div class="flex items-center space-x-3 border-b-4 border-dashed border-slate-200 pb-4 mb-6">
                    <div class="w-12 h-12 bg-red-500 border-2 border-slate-900 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                        +
                    </div>
                    <div>
                        <h2 class="font-black text-2xl text-slate-900 tracking-tight">STEAM+</h2>
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Laboratório de Protótipos</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="bg-amber-50 border-2 border-amber-500/30 rounded-2xl p-4">
                        <span class="text-xs font-extrabold text-amber-700 bg-amber-200/60 px-2 py-0.5 rounded-md uppercase">Painel de Recompensas</span>
                        <p class="text-sm font-semibold text-slate-700 mt-2">Conclua atividades dadas pelos professores para ganhar <span class="text-amber-600 font-bold">XP</span> e <span class="text-indigo-600 font-bold">Stickers LEGO</span> para customizar o seu boneco!</p>
                    </div>
                </div>
            </div>

            <div id="controles" class="flex flex-col gap-3 mt-6">
                <button id="iniciarBtn" class="w-full bg-emerald-400 hover:bg-emerald-500 text-slate-900 font-extrabold py-3 px-4 rounded-xl border-2 border-slate-900 shadow-[3px_3px_0px_0px_rgba(15,23,42,1)] transition-all active:translate-x-0.5 active:translate-y-0.5 active:shadow-none cursor-pointer text-sm uppercase tracking-wider">
                    Iniciar Sparky
                </button>
                <button id="limparBtn" class="w-full bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 px-4 rounded-xl border-2 border-slate-200 text-sm uppercase tracking-wider cursor-pointer">
                    Limpar Tela
                </button>
                <button id="encerrarBtn" class="w-full bg-red-100 hover:bg-red-200 text-red-700 font-bold py-3 px-4 rounded-xl border-2 border-red-200 text-sm uppercase tracking-wider cursor-pointer">
                    Desconectar
                </button>
            </div>
        </div>

        <div class="w-full md:w-2/3 bg-white border-4 border-slate-900 rounded-3xl flex flex-col overflow-hidden shadow-[6px_6px_0px_0px_rgba(15,23,42,1)]">
            
            <header class="bg-amber-400 p-4 border-b-4 border-slate-900 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center font-black text-amber-400 text-xl border-2 border-slate-900 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                        ⚡
                    </div>
                    <div>
                        <h1 class="font-black text-slate-900 text-lg tracking-tight">Sparky</h1>
                        <div id="connection-status" class="text-xs font-bold text-slate-700 bg-amber-200/60 px-2 py-0.5 rounded-full inline-block status-offline">Desconectado</div>
                    </div>
                </div>
            </header>

            <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/50">
                </div>

            <footer class="p-4 bg-white border-t-4 border-slate-900 flex gap-3">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Pergunte algo ao Sparky sobre tarefas, notas ou robótica..." 
                    class="flex-1 bg-slate-100 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 placeholder-slate-400 focus:outline-none focus:border-amber-400 transition-colors"
                >
                <button 
                    id="send-button"
                    class="bg-amber-400 hover:bg-amber-500 text-slate-900 font-extrabold px-6 py-3 rounded-xl border-2 border-slate-900 shadow-[3px_3px_0px_0px_rgba(15,23,42,1)] transition-all active:translate-x-0.5 active:translate-y-0.5 active:shadow-none cursor-pointer text-sm uppercase tracking-wider"
                >
                    Enviar
                </button>
            </footer>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
