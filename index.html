<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM+ Hub - Fale com o Sparky</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Customizações necessárias para renderização do Markdown gerado pelo marked.js */
        .markdown-content p { margin-bottom: 0.5rem; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul { list-style-type: square; margin-left: 1.25rem; margin-bottom: 0.5rem; }
        .markdown-content strong { font-weight: 700; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4 md:p-6 transition-colors duration-200">

    <div class="w-full max-w-5xl flex flex-col md:flex-row gap-6 h-[85vh] max-h-[780px]">
        
        <div class="w-full md:w-1/3 bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-100 rounded-3xl p-6 flex flex-col justify-between shadow-[6px_6px_0px_0px_rgba(15,23,42,1)] dark:shadow-[6px_6px_0px_0px_rgba(241,245,249,1)] transition-all duration-200">
            <div>
                <div class="flex items-center justify-between border-b-4 border-dashed border-slate-200 dark:border-slate-700 pb-4 mb-6">
                    <div class="flex items-center space-x-3">
                        <div class="w-12 h-12 bg-red-500 border-2 border-slate-900 dark:border-slate-100 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                            +
                        </div>
                        <div>
                            <h2 class="font-black text-2xl text-slate-900 dark:text-slate-100 tracking-tight">STEAM+</h2>
                            <p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Módulo LEGO</p>
                        </div>
                    </div>
                    
                    <button id="theme-toggle" class="p-2.5 bg-slate-100 dark:bg-slate-800 border-2 border-slate-900 dark:border-slate-100 rounded-xl hover:bg-amber-400 dark:hover:bg-amber-400 transition-colors cursor-pointer shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] dark:shadow-[2px_2px_0px_0px_rgba(255,255,255,1)]">
                        <span id="theme-toggle-icon" class="text-lg">🌙</span>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="bg-amber-50 dark:bg-slate-800/50 border-2 border-amber-500/30 dark:border-amber-400/20 rounded-2xl p-4">
                        <span class="text-xs font-extrabold text-amber-700 dark:text-amber-400 bg-amber-200/60 dark:bg-amber-950/40 px-2 py-0.5 rounded-md uppercase">Gameficação Ativa</span>
                        <p class="text-sm font-semibold text-slate-700 dark:text-slate-300 mt-2">
                            Conclua missões de projeto para acumular <span class="text-amber-600 dark:text-amber-400 font-bold">XP</span> e desbloquear acessórios exclusivos na lojinha de avatares!
                        </p>
                    </div>
                </div>
            </div>

            <div id="controles" class="flex flex-col gap-3 mt-6">
                <button id="iniciarBtn" class="w-full bg-emerald-400 hover:bg-emerald-500 text-slate-900 font-extrabold py-3 px-4 rounded-xl border-2 border-slate-900 dark:border-slate-100 shadow-[3px_3px_0px_0px_rgba(15,23,42,1)] dark:shadow-[3px_3px_0px_0px_rgba(241,245,249,1)] transition-all active:translate-x-0.5 active:translate-y-0.5 active:shadow-none cursor-pointer text-sm uppercase tracking-wider">
                    Iniciar Sparky
                </button>
                <button id="limparBtn" class="w-full bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-sm uppercase tracking-wider cursor-pointer">
                    Limpar Tela
                </button>
                <button id="encerrarBtn" class="w-full bg-red-100 dark:bg-red-950/40 hover:bg-red-200 dark:hover:bg-red-900/40 text-red-700 dark:text-red-400 font-bold py-3 px-4 rounded-xl border-2 border-red-200 dark:border-red-900/40 text-sm uppercase tracking-wider cursor-pointer">
                    Desconectar
                </button>
            </div>
        </div>

        <div class="w-full md:w-2/3 bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-100 rounded-3xl flex flex-col overflow-hidden shadow-[6px_6px_0px_0px_rgba(15,23,42,1)] dark:shadow-[6px_6px_0px_0px_rgba(241,245,249,1)] transition-all duration-200">
            
            <header class="bg-amber-400 p-4 border-b-4 border-slate-900 dark:border-slate-100 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center font-black text-amber-400 text-xl border-2 border-slate-900 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                        ⚡
                    </div>
                    <div>
                        <h1 class="font-black text-slate-900 text-lg tracking-tight">Sparky</h1>
                        <div id="connection-status" class="text-xs font-bold text-slate-700 bg-amber-200/60 px-2 py-0.5 rounded-full inline-block">Desconectado</div>
                    </div>
                </div>
            </header>

            <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/50 dark:bg-slate-950/20">
                </div>

            <div id="chips-container" class="px-4 py-2 bg-slate-50 dark:bg-slate-900/40 border-t-2 border-dashed border-slate-200 dark:border-slate-800 flex flex-wrap gap-2 items-center">
                <span class="text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-widest mr-1">Sugestões:</span>
                
                <button class="chip-btn hidden bg-sky-100 dark:bg-sky-950/60 hover:bg-sky-200 dark:hover:bg-sky-900/60 text-sky-800 dark:text-sky-300 text-xs font-bold px-3 py-1.5 rounded-xl border border-sky-300 dark:border-sky-800 cursor-pointer transition-colors" data-msg="Como eu faço para ganhar XP e Stickers nas tarefas de STEAM+?">🏆 Como ganhar XP?</button>
                <button class="chip-btn hidden bg-sky-100 dark:bg-sky-950/60 hover:bg-sky-200 dark:hover:bg-sky-900/60 text-sky-800 dark:text-sky-300 text-xs font-bold px-3 py-1.5 rounded-xl border border-sky-300 dark:border-sky-800 cursor-pointer transition-colors" data-msg="Onde eu posso gastar meus pontos de XP na lojinha de LEGO?">🧱 Lojinha de LEGO</button>
                <button class="chip-btn hidden bg-sky-100 dark:bg-sky-950/60 hover:bg-sky-200 dark:hover:bg-sky-900/60 text-sky-800 dark:text-sky-300 text-xs font-bold px-3 py-1.5 rounded-xl border border-sky-300 dark:border-sky-800 cursor-pointer transition-colors" data-msg="Pode me ajudar a entender a diferença básica entre um circuito elétrico em série e um em paralelo?">💡 Ajuda com Circuitos</button>
                
                <button class="chip-btn hidden bg-indigo-100 dark:bg-indigo-950/60 hover:bg-indigo-200 dark:hover:bg-indigo-900/60 text-indigo-800 dark:text-indigo-300 text-xs font-bold px-3 py-1.5 rounded-xl border border-indigo-300 dark:border-indigo-800 cursor-pointer transition-colors" data-msg="Como o sistema faz a liberação automatizada de XP e stickers para os grupos quando dou a nota?">📊 Sistema de Notas e XP</button>
                <button class="chip-btn hidden bg-indigo-100 dark:bg-indigo-950/60 hover:bg-indigo-200 dark:hover:bg-indigo-900/60 text-indigo-800 dark:text-indigo-300 text-xs font-bold px-3 py-1.5 rounded-xl border border-indigo-300 dark:border-indigo-800 cursor-pointer transition-colors" data-msg="Pode me sugerir 3 ideias de projetos práticos de STEAM+ com foco em prototipagem e robótica para o fundamental II?">🛠️ Ideias de Projetos</button>
            </div>

            <footer class="p-4 bg-white dark:bg-slate-900 border-t-4 border-slate-900 dark:border-slate-700 flex gap-3">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Diga se você é Aluno ou Professor para começar..." 
                    class="flex-1 bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-amber-400 dark:focus:border-amber-400 transition-colors"
                >
                <button 
                    id="send-button"
                    class="bg-amber-400 hover:bg-amber-500 text-slate-900 font-extrabold px-6 py-3 rounded-xl border-2 border-slate-900 dark:border-slate-100 shadow-[3px_3px_0px_0px_rgba(15,23,42,1)] dark:shadow-[3px_3px_0px_0px_rgba(241,245,249,1)] transition-all active:translate-x-0.5 active:translate-y-0.5 active:shadow-none cursor-pointer text-sm uppercase tracking-wider"
                >
                    Enviar
                </button>
            </footer>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
