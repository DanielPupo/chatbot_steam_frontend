<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM+ Hub - Fale com o Sparky</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="control-container">
            <div class="brand-header">
                <div class="brand-logo">
                    <div class="logo-icon">+</div>
                    <div>
                        <h2>STEAM+</h2>
                        <p>MÓDULO LEGO</p>
                    </div>
                </div>
                <button id="theme-toggle" class="theme-btn" title="Alternar Tema">
                    <span id="theme-toggle-icon">🌙</span>
                </button>
            </div>

            <div class="info-card">
                <span class="badge">Gamificação Ativa</span>
                <p>Conclua missões de projeto para acumular <strong>XP</strong> e conquistar insígnias e stickers exclusivos de blocos!</p>
            </div>

            <div id="controles">
                <button id="iniciarBtn" class="primary-btn">Iniciar Sparky</button>
                <button id="limparBtn" class="outline-btn">Limpar Tela</button>
                <button id="encerrarBtn" class="dark-btn">Desconectar</button>
            </div>
        </div>

        <div class="chat-container">
            <header class="chat-header">
                <div class="bot-profile">
                    <div class="bot-avatar">⚡</div>
                    <div>
                        <h1>Sparky</h1>
                        <div id="connection-status" class="status-offline">Desconectado</div>
                    </div>
                </div>
            </header>

            <div id="chat-box" class="chat-box">
                </div>

            <div id="chips-container" class="chips-area">
                <span class="chips-label">Sugestões:</span>
                <button class="chip-btn" data-msg="Como eu faço para ganhar XP e Stickers nas tarefas de STEAM+?">🏆 Como ganhar XP?</button>
                <button class="chip-btn" data-msg="Pode me sugerir um desafio de montagem prática com blocos LEGO?">🧱 Desafio LEGO</button>
                <button class="chip-btn" data-msg="Como funciona o sistema de notas automatizado por equipes?">📊 Sistema de Notas</button>
            </div>

            <footer class="chat-input-area">
                <input type="text" id="message-input" placeholder="Clique em Iniciar Sparky para liberar o chat...">
                <button id="send-button" disabled>Enviar</button>
            </footer>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
